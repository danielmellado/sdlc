# sdlc tmux config
# Symlink: ln -sf ~/Devel/openshift/sdlc/tmux/tmux.conf ~/.tmux.conf

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g renumber-windows on
set-option -g base-index 1
setw -g pane-base-index 1
set -s escape-time 0
setw -g aggressive-resize on
set -g focus-events on

# --- Appearance ---
set -g status-fg white
set -g status-bg colour234
set -g window-status-activity-style bold
set -g pane-border-style fg=colour245
set -g pane-active-border-style fg=colour39
set -g message-style fg=colour16,bg=colour221,bold

# Status bar
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=colour39,bold] #S #[fg=colour245]| "
set -g status-right "#[fg=colour245]#{?#{==:#{pane_current_command},claude},#[fg=colour214]AI ,}#[fg=colour245]%H:%M %d-%b "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour39,bold] #I:#W "

# Don't rename windows
set-option -g allow-rename off

# --- Keybindings ---

# Toggle broadcast
bind e set-window-option synchronize-panes

# Mouse mode
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# SSH Agent
set-environment -g 'SSH_AUTH_SOCK' ~/.ssh/ssh_auth_sock

# Vi copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# --- AI Workflow ---
source-file -q ~/Devel/openshift/sdlc/tmux/tmux-ai.conf
