# AI workflow keybindings and layouts for tmux

# bind C: open Claude Code in a right pane (40% width)
bind C split-window -h -l 40% "claude"

# bind S: open a sandboxed Claude Code session via nono
bind S split-window -h -l 40% "nono run --profile claude-code --allow-cwd -- claude"

# bind A: full AI layout (nvim left, Claude Code right)
bind A split-window -h -l 40% "claude" \; select-pane -L

# tmux-ai: a shell function creates a named session with the layout preset
# Usage from shell: tmux-ai ~/project/path
# See shell/ai-aliases.sh for the function definition
