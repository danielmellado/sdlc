# AI workflow keybindings and layouts for tmux
# All bindings use nono sandbox by default.

# prefix + a: open sandboxed Claude Code in a right pane (40% width)
bind a split-window -h -l 40% "$HOME/sdlc/nono/scripts/nono-claude.sh"

# prefix + A (shift+a): full AI layout (nvim left, sandboxed Claude right)
bind A split-window -h -l 40% "$HOME/sdlc/nono/scripts/nono-claude.sh" \; select-pane -L

# prefix + u: unsandboxed Claude Code (escape hatch)
bind u split-window -h -l 40% "claude"

# tmux-ai: a shell function creates a named session with the layout preset
# Usage from shell: tmux-ai ~/project/path
# See shell/ai-aliases.sh for the function definition
